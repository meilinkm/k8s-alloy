alloy:
  podSecurityContext:
    supplementalGroups:
      - 0
    runAsNonRoot: true

  alloy:
    securityContext:
      runAsUser: 473
      runAsGroup: 473
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    mounts:
      varlog: true
      dockercontainers: true

    # Add resource requests & limits
    # By default, only the configReloader container has requests set, but not the alloy container itself.
    resources:
      requests:
        cpu: "100m"
        memory: "350Mi"
      limits:
        cpu: "200m"
        memory: "500Mi"

    configMap:
      create: true
      content: |
        // 1. Discover all pod logs on the node
        discovery.kubernetes "pod_logs" {
          role = "pod"
        }

        // 2. Filter and relabel (optional, but recommended for clean metadata)
        discovery.relabel "logs_to_scrape" {
          targets = discovery.kubernetes.pod_logs.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
        }

        // 3. Scrape the files from the host path (/var/log/pods)
        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.logs_to_scrape.output
          forward_to = [loki.write.local_loki.receiver]
        }

        // 4. Send the logs to your Loki endpoint
        loki.write "local_loki" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

  configReloader:
    securityContext:
      runAsUser: 65534
      runAsGroup: 65534
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL


